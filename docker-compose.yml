services:
  db:
    image: postgres:17-alpine
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.9-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./srcs/backend
    env_file:
      - ./.env
    volumes:
      - ./srcs/backend:/app
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./srcs/frontend
    volumes:
      - ./srcs/frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

  nginx:
    build: ./srcs/nginx
    ports:
      - "8080:80" # changer en 443 pour la prod
    volumes:
      - static_data:/static:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
  static_data: