# FICHIER DE CONFIG POUR DEV, A MODIFIER POUR PROD

# connexions simultanées
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # Gestion des WebSockets Vite
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Serveur backend vers lequel Nginx peut transmettre des requêtes
    upstream backend {
        server backend:8000;
    }

    # Serveur frontend vers lequel Nginx peut transmettre des requêtes
    # Disparait en prod
    upstream frontend {
        server frontend:5173;
    }

    # Server HTTP (en prod, HTTPS et certificat TLS)
    server {
        listen 80;
        server_name localhost;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Intercepte les URLs qui commencent par /api/ : http://localhost/api/users/
        # Transmets les requetes au backend Django
        location /api/ {
            proxy_pass http://backend;
        }

        # Intercepte les URLs qui commencent par /admin/ : http://localhost/admin/
        # Permet d’accéder à l’administration Django
        location /admin/ {
            proxy_pass http://backend;
        }

        # Route pour les fichiers statiques Django : /static/admin/css/base.css
        location /static/ {
            alias /static/;
        }

        # location /ws/ : WebSockets Django applicatifs
        location /ws/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Route principale, envoyer au server Vite
        # Sert à récupérer les fichiers visuels et techniques de Django (hors python)
        # location / : WebSocket Vite pour le rechargement en développement
        location / {
            proxy_pass http://frontend;

            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}