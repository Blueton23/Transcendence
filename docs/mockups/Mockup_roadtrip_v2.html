document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n            <div style=\"position:absolute;inset:0\">\n              <div style=\"height:250px;position:relative;background:linear-gradient(135deg,#3A3760 0%,#2B2A47 60%,#211F3A 100%)\"><div style=\"position:absolute;left:20px;bottom:18px;color:#fff\"><div style=\"font:500 10px 'JetBrains Mono';letter-spacing:.12em;text-transform:uppercase;opacity:.9;margin-bottom:5px\">Suisse · 5 jours<\u002Fdiv><div style=\"font:800 25px/1 Archivo\">Road trip Suisse<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position:absolute;inset:0;background:rgba(24,22,50,.52)\"><\u002Fdiv>\n            <div style=\"position:absolute;left:0;right:0;bottom:0;top:104px;background:#FBF6EC;border-radius:28px 28px 0 0;padding:14px 18px 20px;overflow-y:auto;box-shadow:0 -20px 50px -20px rgba(20,18,45,.4)\">\n              <div style=\"width:40px;height:4px;border-radius:100px;background:#D8CFBD;margin:0 auto 16px\"><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\">\n                <span style=\"width:40px;height:40px;border-radius:12px;background:#F6E3D8;color:#D8482D;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg style=\"width:21px;height:21px\"><use href=\"#i-pinplus\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n                <div style=\"flex:1\"><div style=\"font:800 19px Archivo;letter-spacing:-.01em;color:#2B2A47\">Épingler une idée<\u002Fdiv><div style=\"font:500 11px Archivo;color:#9A8F7E;margin-top:1px\">Visible par l'équipe<\u002Fdiv><\u002Fdiv>\n                <button style=\"width:34px;height:34px;border-radius:50%;background:#EFE7D8;border:none;color:#9A8F7E;display:flex;align-items:center;justify-content:center;cursor:pointer;font:400 20px Archivo;line-height:1\">×<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font:600 11px 'JetBrains Mono';letter-spacing:.06em;color:#615B6E;margin-bottom:9px\">C'EST QUOI&nbsp;?<\u002Fdiv>\n              <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px\">\n                <sc-for list=\"{{ catOptions }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <button sc-camel-on-click=\"{{ c.onSelect }}\" style=\"{{ c.chipStyleSm }}\"><svg style=\"width:15px;height:15px;color:{{ c.iconColor }}\"><use href=\"{{ c.icon }}\"><\u002Fuse><\u002Fsvg>{{ c.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:12px;background:#F6E3D8;color:#B04A2E;font:600 11px Archivo;margin-bottom:16px\"><svg style=\"width:14px;height:14px;flex-shrink:0\"><use href=\"#i-spark\"><\u002Fuse><\u002Fsvg>{{ formHint }}<\u002Fdiv>\n              <div style=\"margin-bottom:14px\">\n                <div style=\"font:600 11px Archivo;color:#615B6E;margin-bottom:6px\">Nom<\u002Fdiv>\n                <div style=\"padding:12px 14px;border-radius:13px;background:#fff;border:1px solid rgba(43,42,71,.12);font:600 14px Archivo;color:#2B2A47\">Camping Attermenzen<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-bottom:14px\">\n                <div style=\"font:600 11px Archivo;color:#615B6E;margin-bottom:6px\">Étape<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:13px;background:#fff;border:1px solid rgba(43,42,71,.12)\"><span style=\"display:inline-flex;align-items:center;gap:8px;font:600 14px Archivo;color:#2B2A47\"><svg style=\"width:15px;height:15px;color:var(--accent,#F2664A)\"><use href=\"#i-pin\"><\u002Fuse><\u002Fsvg>Zermatt · 14–16<\u002Fspan><svg style=\"width:15px;height:15px;color:#9A8F7E\"><use href=\"#i-chev-down\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ showPrice }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"margin-bottom:14px\">\n                <div style=\"font:600 11px Archivo;color:#615B6E;margin-bottom:6px\">Prix / nuit <span style=\"color:#B3A996;font-weight:500\">· si hébergement<\u002Fspan><\u002Fdiv>\n                <div style=\"padding:12px 14px;border-radius:13px;background:#fff;border:1px solid rgba(43,42,71,.12);font:600 14px 'JetBrains Mono';color:#2B2A47\">24 CHF<\u002Fdiv>\n              <\u002Fdiv><\u002Fsc-if>\n              <div style=\"margin-bottom:14px\">\n                <div style=\"font:600 11px Archivo;color:#615B6E;margin-bottom:6px\">Note pour l'équipe<\u002Fdiv>\n                <div style=\"padding:12px 14px;border-radius:13px;background:#fff;border:1px solid rgba(43,42,71,.12);font:500 13px/1.4 Archivo;color:#2B2A47;min-height:48px\">Option petit budget, vue sur le Cervin depuis la tente&nbsp;!<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font:500 16px Caveat;color:#B0654A;margin-bottom:14px\">dis-leur pourquoi tu l'aimes ♥<\u002Fdiv>\n              <button style=\"width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px;border-radius:15px;background:var(--accent,#F2664A);color:#fff;border:none;font:700 14px Archivo;cursor:pointer;box-shadow:0 16px 30px -12px rgba(215,72,45,.6)\"><svg style=\"width:18px;height:18px\"><use href=\"#i-pinplus\"><\u002Fuse><\u002Fsvg>Épingler pour l'équipe<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1720, &quot;height&quot;: 1200 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F2664A&quot;, &quot;options&quot;: [&quot;#F2664A&quot;, &quot;#F0572E&quot;, &quot;#FF6B4D&quot;, &quot;#EC5C3A&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Style&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    activeStep: 3,\n    mapExpanded: false,\n    formCat: 'hebergement',\n    ideas: {\n      fondue:      { votes:4, liked:true  },\n      pont:        { votes:1, liked:false },\n      vevey:       { votes:1, liked:false },\n      petitdej:    { votes:2, liked:false },\n      bachalpsee:  { votes:3, liked:false },\n      grutli:      { votes:2, liked:false },\n      gornergrat:  { votes:2, liked:false },\n      backpackers: { votes:3, liked:true  },\n      camping:     { votes:1, liked:false },\n    },\n  };\n\n  setActive(n){ this.setState({ activeStep:n }); }\n  toggleMap(){ this.setState(s=>({ mapExpanded:!s.mapExpanded })); }\n  setCat(k){ this.setState({ formCat:k }); }\n\n  chip(sel, sm) {\n    return {\n      display:'inline-flex', alignItems:'center', gap:'8px', cursor:'pointer',\n      padding: sm ? '9px 13px' : '10px 15px', borderRadius:'100px',\n      font:'700 13px Archivo',\n      background: sel ? '#2B2A47' : '#fff',\n      color: sel ? '#F7F1E6' : '#615B6E',\n      border: sel ? '1px solid transparent' : '1px solid rgba(43,42,71,.12)',\n    };\n  }\n\n  toggle(id) {\n    this.setState(s => {\n      const it = s.ideas[id];\n      return { ideas: { ...s.ideas, [id]: { liked:!it.liked, votes: it.liked ? it.votes-1 : it.votes+1 } } };\n    });\n  }\n\n  pill(liked, acc, sm) {\n    return {\n      display:'inline-flex', alignItems:'center', gap:'5px', cursor:'pointer', flexShrink:0,\n      padding: sm ? '5px 10px' : '7px 12px', borderRadius:'100px',\n      font: sm ? \"700 11px 'JetBrains Mono'\" : \"700 12px 'JetBrains Mono'\",\n      background: liked ? acc : '#F1E9DB',\n      color: liked ? '#fff' : '#6B6579',\n      border: liked ? '1px solid transparent' : '1px solid rgba(43,42,71,.1)',\n      boxShadow: liked ? '0 6px 14px -8px rgba(215,72,45,.7)' : 'none',\n    };\n  }\n\n  renderVals() {\n    const acc = this.props.accent ?? '#F2664A';\n    const V = {};\n    for (const id of Object.keys(this.state.ideas)) {\n      const it = this.state.ideas[id];\n      const heart = (px) => React.createElement('svg', { style:{ width:px+'px', height:px+'px' } },\n        React.createElement('use', { href: it.liked ? '#i-heart-f' : '#i-heart' }));\n      V[id] = {\n        votes: it.votes,\n        heartEl: heart(14),\n        heartElSm: heart(13),\n        heartElXs: heart(12),\n        heartElXxs: heart(11),\n        pill: this.pill(it.liked, acc, false),\n        pillSm: this.pill(it.liked, acc, true),\n        onLike: () => this.toggle(id),\n      };\n    }\n    const act = this.state.activeStep;\n    const CATS = [\n      { key:'resto',       label:'Resto',       icon:'#i-fork', hint:'Un resto rejoint les idées à voter de cette étape.' },\n      { key:'hebergement', label:'Hébergement', icon:'#i-bed',  hint:\"Un hébergement devient candidat pour la nuit de l'étape.\" },\n      { key:'activite',    label:'Activité',    icon:'#i-mtn',  hint:'Une activité rejoint les idées à voter de cette étape.' },\n      { key:'avoir',       label:'À voir',      icon:'#i-pin',  hint:'Un lieu à voir rejoint les idées de cette étape.' },\n    ];\n    const sel = this.state.formCat;\n    const catOptions = CATS.map(c => ({\n      key:c.key, label:c.label, icon:c.icon,\n      onSelect: () => this.setCat(c.key),\n      chipStyle: this.chip(c.key===sel, false),\n      chipStyleSm: this.chip(c.key===sel, true),\n      iconColor: c.key===sel ? '#F7F1E6' : '#8A8496',\n    }));\n    const active = CATS.find(c => c.key===sel) || CATS[1];\n\n    return {\n      V, accent: acc,\n      a1: act===1, a2: act===2, a3: act===3,\n      onS1: () => this.setActive(1),\n      onS2: () => this.setActive(2),\n      onS3: () => this.setActive(3),\n      mapExpanded: this.state.mapExpanded,\n      onToggleMap: () => this.toggleMap(),\n      catOptions, formHint: active.hint, showPrice: sel === 'hebergement',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
